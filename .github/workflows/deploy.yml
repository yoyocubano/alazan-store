name: Deploy to IONOS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend to IONOS via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /alazanstore.shop/public/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/backend/**
            **/*.py
            .claude/**
            Full
            graphic_shaokahn_raw.jpeg

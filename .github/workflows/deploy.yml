name: Deploy to IONOS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to IONOS via SFTP batch
        run: |
          REMOTE="/alazanstore.shop/public"
          SFTP_HOST="${{ secrets.IONOS_HOST }}"
          SFTP_USER="${{ secrets.IONOS_USER }}"
          SFTP_PASS="${{ secrets.IONOS_PASSWORD }}"

          # Build batch file with all root-level files
          BATCH=$(mktemp)
          for f in $(find . -maxdepth 1 -type f ! -name '.*'); do
            fname="${f#./}"
            echo "put $f $REMOTE/$fname" >> "$BATCH"
          done

          echo "Uploading $(wc -l < "$BATCH") files..."
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -b "$BATCH" "$SFTP_USER@$SFTP_HOST"
          echo "Deploy complete"

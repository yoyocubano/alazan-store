name: Deploy to IONOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'main.v6.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy index.html to IONOS
        if: contains(github.event.commits[0].modified, 'index.html') || github.event_name == 'workflow_dispatch'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 22
          local_path: './index.html'
          remote_path: '/alazanstore.shop/public'
          sftp_only: true
          args: '-o StrictHostKeyChecking=no'

      - name: Deploy styles.css to IONOS
        if: contains(github.event.commits[0].modified, 'styles.css') || github.event_name == 'workflow_dispatch'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 22
          local_path: './styles.css'
          remote_path: '/alazanstore.shop/public'
          sftp_only: true
          args: '-o StrictHostKeyChecking=no'

      - name: Purge jsDelivr CDN cache for main.v6.js
        if: contains(github.event.commits[0].modified, 'main.v6.js') || github.event_name == 'workflow_dispatch'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/yoyocubano/alazan-store@main/main.v6.js"
          echo "CDN purged"

name: Deploy to IONOS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to IONOS via SFTP batch
        env:
          SSHPASS: ${{ secrets.IONOS_PASSWORD }}
          HOST: ${{ secrets.IONOS_HOST }}
          USER: ${{ secrets.IONOS_USER }}
        run: |
          REMOTE="/alazanstore.shop/public"

          # Build batch file with all root-level files
          BATCH=$(mktemp)
          for f in $(find . -maxdepth 1 -type f ! -name '.*'); do
            fname="${f#./}"
            echo "put $f $REMOTE/$fname" >> "$BATCH"
          done

          echo "--- Batch commands ---"
          cat "$BATCH"
          echo "---"

          sshpass -e sftp -o StrictHostKeyChecking=no -b "$BATCH" "$USER@$HOST"
          echo "Deploy complete"
